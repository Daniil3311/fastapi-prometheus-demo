groups:
  - name: fastapi-alerts
    rules:
      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(app_request_latency_seconds_bucket[5m])) by (le)) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "p95 latency has been above 1 second for at least 2 minutes"
